<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="board/layout/basic">
	<th:block layout:fragment="title">
		<title>COVID-19 발생현황</title>
	</th:block>
<head>
    <meta charset="UTF-8">
    <title>COVID-19 tracker</title>
    <!-- Boostrap 4 CSS -->
	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
	<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>

</head>
<body>
<script src="https://code.jquery.com/jquery-3.4.1.slim.min.js"integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n"crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.min.js"integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6"crossorigin="anonymous"></script>

    <th:block layout:fragment="content">
		<div class="table-responsive clearfix">
			<table class="table table-hover">
				<thead>
					<tr>
						<th>지역</th>
				        <th>확진환자수(전일 대비 증감량)</th>
				        <th>사망자</th>
				        <th title = "인구 10만 명당">발생률(*)</th>
					</tr>
				</thead>
				<tbody>
					<tr th:if ="${not #lists.isEmpty(covidStats)}" th:each="stat:${covidStats}">
						<td th:text = "${stat.province}"> </td>
			            <td th:text = "${stat.totalPatient}">0</td>
			            <td th:text = "${stat.death}">0</td>
			            <td th:text = "${stat.incidenceRate}">0</td>
					</tr>
				</tbody>
			</table>
			<p>
				<span>(*) 인구 10만 명당 (지역별 인구 출처 : 행정안전부, 주민등록인구현황 (’21.12월 기준))</span><br>
				<span>※ 지역구분은 신고지를 기준으로 하며, 초기 신고 이후 소관지역이 변경된 경우 변동 가능</span>
			</p>
		</div>
	</th:block>
	
</body>
</html>
